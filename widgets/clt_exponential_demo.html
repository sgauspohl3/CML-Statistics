<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CLT — Exponential population</title>
<style>
  :root {
    --surface-1: #ffffff;
    --surface-2: #ffffff;
    --border: #d0d0d0;
    --text-primary: #1a1a1a;
    --text-secondary: #5a5a5a;
  }
  html, body {
    margin: 0;
    padding: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: transparent;
    color: var(--text-primary);
  }
  .controls {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    margin-bottom: 1.5rem; padding: 1rem 1.25rem;
    background: var(--surface-1); border-radius: 12px;
    border: 0.5px solid var(--border);
  }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-group label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
  .ctrl-group span { font-size: 13px; font-weight: 500; min-width: 28px; color: var(--text-primary); }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .chart-card {
    background: var(--surface-2); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
  }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .chart-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  @media (max-width: 520px) { .charts-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="controls">
  <div class="ctrl-group">
    <label>Sample size n</label>
    <input type="range" min="1" max="100" value="10" id="n-slider" step="1" style="width:120px">
    <span id="n-out">10</span>
  </div>
  <div class="ctrl-group">
    <label>No. of samples</label>
    <input type="range" min="200" max="5000" value="2000" id="k-slider" step="100" style="width:120px">
    <span id="k-out">2000</span>
  </div>
  <div class="ctrl-group">
    <label>Rate λ</label>
    <input type="range" min="1" max="10" value="3" id="lam-slider" step="0.5" style="width:100px">
    <span id="lam-out">3</span>
  </div>
</div>

<div class="charts-grid">
  <div class="chart-card">
    <div class="chart-title">Population distribution</div>
    <div class="chart-sub" id="pop-sub">Exponential(λ=3) — mean = 0.33, skewness = 2</div>
    <div style="position:relative;height:220px"><canvas id="popChart"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Distribution of sample means</div>
    <div class="chart-sub" id="samp-sub">n=10 — sampling distribution of x̄</div>
    <div style="position:relative;height:220px"><canvas id="sampChart"></canvas></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#2a78d6"></div>sample means</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#e34948; border-radius:50%"></div>normal curve</div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Convergence: skewness vs n</div>
    <div class="chart-sub">Skewness of x̄ → 0 as n increases (CLT)</div>
    <div style="position:relative;height:220px"><canvas id="skewChart"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">SE shrinks as 1/√n</div>
    <div class="chart-sub" id="se-sub">Std dev of x̄ = σ/√n</div>
    <div style="position:relative;height:220px"><canvas id="seChart"></canvas></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const BLUE = '#2a78d6', RED = '#e34948', GRAY = '#888780', TEAL = '#1baf7a';

function sampleExp(lam) {
  return -Math.log(1 - Math.random()) / lam;
}

function makeHistogram(data, nBins) {
  const mn = Math.min(...data), mx = Math.max(...data);
  const w = (mx - mn) / nBins;
  const bins = Array(nBins).fill(0);
  const labels = [];
  for (let i = 0; i < nBins; i++) labels.push(+(mn + (i + 0.5) * w).toFixed(3));
  data.forEach(v => {
    let idx = Math.floor((v - mn) / w);
    if (idx >= nBins) idx = nBins - 1;
    bins[idx]++;
  });
  return { labels, counts: bins, width: w, min: mn, max: mx };
}

function normalPDF(x, mu, sigma) {
  return Math.exp(-0.5 * ((x - mu) / sigma) ** 2) / (sigma * Math.sqrt(2 * Math.PI));
}

function skewness(arr) {
  const n = arr.length;
  const mu = arr.reduce((a, b) => a + b, 0) / n;
  const s = Math.sqrt(arr.reduce((a, v) => a + (v - mu) ** 2, 0) / n);
  if (s === 0) return 0;
  return arr.reduce((a, v) => a + ((v - mu) / s) ** 3, 0) / n;
}

function std(arr) {
  const n = arr.length;
  const mu = arr.reduce((a, b) => a + b, 0) / n;
  return Math.sqrt(arr.reduce((a, v) => a + (v - mu) ** 2, 0) / n);
}

const commonOptions = (yLabel) => ({
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
  scales: {
    x: { ticks: { color: GRAY, font: { size: 10 }, maxTicksLimit: 7 }, grid: { color: 'rgba(128,128,128,0.12)' } },
    y: { ticks: { color: GRAY, font: { size: 10 } }, grid: { color: 'rgba(128,128,128,0.12)' }, title: { display: !!yLabel, text: yLabel, color: GRAY, font: { size: 10 } } }
  }
});

const popCtx = document.getElementById('popChart').getContext('2d');
const sampCtx = document.getElementById('sampChart').getContext('2d');
const skewCtx = document.getElementById('skewChart').getContext('2d');
const seCtx = document.getElementById('seChart').getContext('2d');

let popChart, sampChart, skewChart, seChart;

function buildCharts(n, k, lam) {
  const mu = 1 / lam;
  const sigma = 1 / lam;

  const popData = Array.from({ length: 20000 }, () => sampleExp(lam));
  const popHist = makeHistogram(popData.filter(v => v < mu * 6), 40);

  const means = Array.from({ length: k }, () => {
    let s = 0; for (let i = 0; i < n; i++) s += sampleExp(lam); return s / n;
  });
  const meanMu = means.reduce((a, b) => a + b, 0) / k;
  const meanSigma = std(means);
  const sampHist = makeHistogram(means, 40);
  const normScale = k * sampHist.width;
  const normalOverlay = sampHist.labels.map(x => normalPDF(x, meanMu, meanSigma) * normScale);

  const ns = [1, 2, 5, 10, 20, 30, 50, 75, 100];
  const skewVals = ns.map(ni => {
    const m = Array.from({ length: 1000 }, () => { let s = 0; for (let i = 0; i < ni; i++) s += sampleExp(lam); return s / ni; });
    return +skewness(m).toFixed(3);
  });
  const seVals = ns.map(ni => +(sigma / Math.sqrt(ni)).toFixed(4));

  document.getElementById('pop-sub').textContent = `Exponential(λ=${lam}) — mean = ${mu.toFixed(2)}, σ = ${sigma.toFixed(2)}`;
  document.getElementById('samp-sub').textContent = `n=${n} — SE = σ/√n = ${(sigma / Math.sqrt(n)).toFixed(3)}`;
  document.getElementById('se-sub').textContent = `σ = ${sigma.toFixed(2)}, σ/√n at n=${n}: ${(sigma / Math.sqrt(n)).toFixed(3)}`;

  if (popChart) popChart.destroy();
  popChart = new Chart(popCtx, {
    type: 'bar',
    data: {
      labels: popHist.labels.map(v => v.toFixed(2)),
      datasets: [{ label: 'count', data: popHist.counts, backgroundColor: BLUE + 'aa', borderColor: BLUE, borderWidth: 0.5, borderRadius: 2, barPercentage: 1, categoryPercentage: 1 }]
    },
    options: commonOptions('frequency')
  });

  if (sampChart) sampChart.destroy();
  sampChart = new Chart(sampCtx, {
    type: 'bar',
    data: {
      labels: sampHist.labels.map(v => v.toFixed(3)),
      datasets: [
        { label: 'sample means', data: sampHist.counts, backgroundColor: BLUE + 'aa', borderColor: BLUE, borderWidth: 0.5, borderRadius: 2, barPercentage: 1, categoryPercentage: 1, order: 2 },
        { label: 'normal', data: normalOverlay, type: 'line', borderColor: RED, borderWidth: 2, pointRadius: 0, fill: false, tension: 0.4, order: 1 }
      ]
    },
    options: commonOptions('frequency')
  });

  if (skewChart) skewChart.destroy();
  skewChart = new Chart(skewCtx, {
    type: 'line',
    data: {
      labels: ns.map(String),
      datasets: [
        { label: 'theoretical 2/√n', data: ns.map(ni => +(2 / Math.sqrt(ni)).toFixed(3)), borderColor: GRAY, borderWidth: 1.5, borderDash: [4, 3], pointRadius: 0, fill: false },
        { label: 'observed skewness', data: skewVals, borderColor: TEAL, borderWidth: 2, pointRadius: 4, pointBackgroundColor: TEAL, fill: false }
      ]
    },
    options: { ...commonOptions('skewness'), plugins: { legend: { display: false }, annotation: {} } }
  });

  if (seChart) seChart.destroy();
  seChart = new Chart(seCtx, {
    type: 'line',
    data: {
      labels: ns.map(String),
      datasets: [
        { label: 'σ/√n (theoretical)', data: seVals, borderColor: BLUE, borderWidth: 2, pointRadius: 4, pointBackgroundColor: BLUE, fill: false },
      ]
    },
    options: commonOptions('std error')
  });
}

function getVals() {
  return {
    n: +document.getElementById('n-slider').value,
    k: +document.getElementById('k-slider').value,
    lam: +document.getElementById('lam-slider').value
  };
}

function update() {
  const { n, k, lam } = getVals();
  document.getElementById('n-out').textContent = n;
  document.getElementById('k-out').textContent = k;
  document.getElementById('lam-out').textContent = lam;
  buildCharts(n, k, lam);
}

['n-slider', 'k-slider', 'lam-slider'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.getElementById('n-out').textContent = document.getElementById('n-slider').value;
    document.getElementById('k-out').textContent = document.getElementById('k-slider').value;
    document.getElementById('lam-out').textContent = document.getElementById('lam-slider').value;
  });
  document.getElementById(id).addEventListener('change', update);
});

update();
</script>

</body>
</html>
